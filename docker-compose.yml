version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: schitzer-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: schitzer
      POSTGRES_USER: schitzer
      POSTGRES_PASSWORD: schitzer
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
